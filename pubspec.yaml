name: taskflow
description: TaskFlow – Gestion intelligente de tâches
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Base de données locale
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP
  http: ^1.2.1

  # Notifications locales
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3

flutter:
  generate: true
  uses-material-design: true
